<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TryOut Pintar - Platform Latihan UTBK</title>
  <meta name="description" content="Platform latihan soal dan simulasi try out UTBK terlengkap. Raih skor tertinggi dengan latihan rutin dan analisis performa.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/output.css">
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-card-hover: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #334155;
      --glass: rgba(30, 41, 59, 0.8);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      left: -30%;
      width: 80%;
      height: 80%;
      background: radial-gradient(circle, rgba(245,158,11,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 800;
      font-size: 1.25rem;
      color: var(--primary-light);
      text-decoration: none;
    }
    .navbar-brand span { color: var(--accent); }
    .navbar-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      list-style: none;
    }
    .navbar-nav a, .navbar-nav button {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
      border: none;
      background: none;
      cursor: pointer;
      font-family: inherit;
    }
    .navbar-nav a:hover, .navbar-nav button:hover { color: var(--text-primary); background: var(--bg-card); }
    .navbar-nav a.active { color: var(--primary-light); background: rgba(99,102,241,0.1); }
    .nav-credits {
      background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.1)) !important;
      color: var(--accent) !important;
      font-weight: 600 !important;
      border: 1px solid rgba(245,158,11,0.3) !important;
    }

    /* Main content */
    .main { padding-top: 80px; min-height: 100vh; position: relative; z-index: 1; }

    /* Cards */
    .card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      transition: all 0.3s ease;
    }
    .card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.1); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      border-radius: 0.625rem;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      font-family: inherit;
      text-decoration: none;
    }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(99,102,241,0.4); }
    .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .btn-success:hover { box-shadow: 0 4px 15px rgba(16,185,129,0.4); }
    .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
    .btn-outline:hover { border-color: var(--primary); background: rgba(99,102,241,0.1); }
    .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8125rem; }
    .btn-lg { padding: 0.75rem 2rem; font-size: 1rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    /* Container */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

    /* Grid */
    .grid { display: grid; gap: 1.5rem; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    @media (max-width: 768px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .navbar-nav { gap: 0.25rem; }
      .navbar-nav a, .navbar-nav button { padding: 0.375rem 0.5rem; font-size: 0.75rem; }
    }

    /* Stats */
    .stat-card {
      background: linear-gradient(135deg, var(--bg-card), var(--bg-card-hover));
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      text-align: center;
    }
    .stat-value { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary-light), var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-label { font-size: 0.8125rem; color: var(--text-muted); margin-top: 0.25rem; }

    /* Auth pages */
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .auth-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-card h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; }
    .auth-card p { color: var(--text-muted); margin-bottom: 2rem; }

    /* Forms */
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.375rem; }
    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      color: var(--text-primary);
      font-size: 0.9375rem;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }
    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .form-input option { background: var(--bg-dark); color: var(--text-primary); }
    select.form-input { cursor: pointer; }
    textarea.form-input { resize: vertical; min-height: 80px; }
    .field-error {
      color: #ff4757;
      font-size: 0.75rem;
      font-weight: 600;
      margin-top: 0.25rem;
      min-height: 1rem;
    }

    /* Tables */
    .table-wrap { overflow-x: auto; border-radius: 0.75rem; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--bg-card); padding: 0.75rem 1rem; text-align: left; font-size: 0.8125rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 0.75rem 1rem; border-top: 1px solid var(--border); font-size: 0.875rem; }
    tr:hover td { background: rgba(99,102,241,0.03); }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.625rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-success { background: rgba(16,185,129,0.15); color: #34d399; }
    .badge-warning { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-danger { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-info { background: rgba(99,102,241,0.15); color: #818cf8; }

    /* Modal/Popup */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 2rem;
      width: 90%;
      max-width: 440px;
      transform: scale(0.9);
      transition: transform 0.3s;
    }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .modal-actions .btn { flex: 1; }

    /* Exam UI */
    .exam-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .timer {
      font-size: 1.5rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
    }
    .timer.danger { color: var(--danger); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .question-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      padding: 1rem;
      max-width: 100%;
    }
    .q-dot {
      width: 36px;
      height: 36px;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
      background: var(--bg-dark);
      color: var(--text-muted);
    }
    .q-dot.answered { background: rgba(99,102,241,0.2); border-color: var(--primary); color: var(--primary-light); }
    .q-dot.current { background: var(--primary); color: white; border-color: var(--primary); }
    .q-dot:hover { border-color: var(--primary-light); }

    .option-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 0.75rem;
      color: var(--text-primary);
      font-size: 0.9375rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .option-btn:hover { border-color: var(--primary); background: rgba(99,102,241,0.05); }
    .option-btn.selected { border-color: var(--primary); background: rgba(99,102,241,0.15); }
    .option-btn.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
    .option-btn.wrong { border-color: var(--danger); background: rgba(239,68,68,0.15); }
    .option-label { font-weight: 700; margin-right: 0.75rem; color: var(--primary-light); }

    /* Premium Timer Floating UI */
    .timer-container {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.5rem 1.5rem;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5), 0 0 20px rgba(99, 102, 241, 0.1);
      z-index: 1000;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .timer-container:hover {
      background: rgba(30, 41, 59, 0.85);
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: 0 15px 40px -10px rgba(0, 0, 0, 0.6), 0 0 30px rgba(99, 102, 241, 0.2);
    }
    .timer-icon { font-size: 1.25rem; color: var(--accent); }
    .timer-value {
      font-family: 'Inter', monospace;
      font-size: 1.25rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
    }
    .timer-value.critical {
      color: var(--danger);
      text-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
      animation: timer-pulse 1s infinite;
    }
    @keyframes timer-pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    .timer-subtest-info {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Progress bar */
    .progress-bar {
      height: 6px;
      background: var(--bg-dark);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* Chart bars (simple CSS charts) */
    .chart-bar-container { display: flex; align-items: flex-end; gap: 0.5rem; height: 200px; padding: 1rem 0; }
    .chart-bar-item { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }
    .chart-bar {
      width: 100%;
      max-width: 60px;
      border-radius: 0.375rem 0.375rem 0 0;
      transition: height 0.5s ease;
      min-height: 4px;
    }
    .chart-bar-label { font-size: 0.625rem; color: var(--text-muted); margin-top: 0.5rem; text-align: center; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chart-bar-value { font-size: 0.75rem; font-weight: 600; margin-bottom: 0.25rem; }

    /* Toast */
    .toast-container { position: fixed; top: 80px; right: 1rem; z-index: 300; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast {
      padding: 0.75rem 1.25rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease;
      max-width: 350px;
    }
    .toast.success { border-color: var(--success); color: #34d399; }
    .toast.error { border-color: var(--danger); color: #f87171; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Section headers */
    .section-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    .section-subtitle { color: var(--text-muted); margin-bottom: 2rem; }

    /* Package cards */
    .pkg-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .pkg-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .pkg-card:hover { border-color: var(--primary); transform: translateY(-2px); }
    .pkg-card:hover::before { opacity: 1; }
    .pkg-card.purchased { border-color: rgba(16,185,129,0.3); }
    .pkg-card.purchased::before { background: linear-gradient(90deg, var(--success), #34d399); opacity: 1; }

    /* Loading spinner */
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive hamburger */
    .menu-toggle { display: none; background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; }
    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      .navbar-nav {
        position: absolute;
        top: 64px;
        left: 0;
        right: 0;
        background: rgba(15,23,42,0.98);
        backdrop-filter: blur(20px);
        flex-direction: column;
        padding: 1rem;
        border-bottom: 1px solid var(--border);
        display: none;
      }
      .navbar-nav.open { display: flex; }
      .navbar-nav a, .navbar-nav button { width: 100%; text-align: left; }
    }

    /* Subtest tabs */
    .subtest-tabs { display: flex; gap: 0.25rem; overflow-x: auto; padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
    .subtest-tab {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
    }
    .subtest-tab:hover { border-color: var(--primary); }
    .subtest-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .subtest-tab.completed { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.3); color: #34d399; }

    /* Fade in animation */
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    h1 { font-size: 1.75rem; }
    h2 { font-size: 1.25rem; font-weight: 700; }
  </style>
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>
  <div id="app"></div>

  <script src="/js/app.js?v=1.2"></script>
  <script src="/js/auth.js?v=1.2"></script>
  <script src="/js/dashboard.js?v=1.2"></script>
  <script src="/js/quiz.js?v=1.2"></script>
  <script src="/js/tryout.js?v=1.2"></script>
  <script src="/js/tryout_details.js?v=1.2"></script>
  <script src="/js/exam.js?v=1.2"></script>
  <script src="/js/results.js?v=1.2"></script>
  <script src="/js/leaderboard.js?v=1.2"></script>
  <script src="/js/payment.js?v=1.2"></script>
  <script src="/js/admin.js?v=1.2"></script>
</body>
</html>
